<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вопросы – Споджиславие</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <a href="index.html">
        <img src="https://i.ibb.co/d4G3b1pc/21312.png" alt="Споджиславие" style="height:32px; width:auto; vertical-align:middle; margin-right:8px;">
        Споджиславие
      </a>
    </div>
    <button class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Главное</a></li>
      <li><a href="about.html">О нас</a></li>
      <li><a href="news.html">Новости</a></li>
      <li><a href="recipes.html">Рецепты</a></li>
      <li><a href="calendar.html">Календарь</a></li>
      <li><a href="forum.html">Форум</a></li>
      <li><a href="miracles.html">Чудеса</a></li>
      <li><a href="ask.html" class="active">Вопросы</a></li>
      <li><a href="contacts.html">Контакты</a></li>
    </ul>
  </header>

  <main class="container">
    <div style="text-align:center; margin-bottom:0.5rem;">
      <img src="https://i.ibb.co/d4G3b1pc/21312.png" alt="Споджиславие" style="max-width:150px; height:auto;">
    </div>
    <h1>🙏 Задать вопрос Владиславу IV</h1>
    <div class="subhead">Напишите, и мы ответим в течение нескольких дней</div>

    <div style="max-width:600px; margin:0 auto; background:#fffcf5; padding:2rem; border-radius:24px; border:2px solid #e6d4bf;">
      <form action="https://formspree.io/f/xdarkrpz" method="POST">
        <div class="form-group">
          <label for="name">Ваше имя</label>
          <input type="text" id="name" name="name" required placeholder="Сподж-повар">
        </div>
        <div class="form-group">
          <label for="email">Ваш e-mail (для ответа)</label>
          <input type="email" id="email" name="email" required placeholder="example@mail.ru">
        </div>
        <div class="form-group">
          <label for="question">Ваш вопрос</label>
          <textarea id="question" name="question" required placeholder="О чём вы хотели бы спросить Владислава IV?"></textarea>
        </div>
        <input type="hidden" name="_subject" value="Новый вопрос от последователя">
        <button type="submit" class="btn-submit" style="width:100%;">Отправить вопрос</button>
      </form>
      <p style="font-size:0.9rem; color:#8b735f; text-align:center; margin-top:1rem;">Мы ценим каждый вопрос и отвечаем с любовью.</p>
    </div>

    <div class="footer">
      <p>Споджиславие © 2004–2026 — <span class="gold">Свет трапезы</span></p>
    </div>
  </main>

  <script>
    const toggle = document.getElementById('menuToggle');
    const nav = document.getElementById('navLinks');
    toggle.addEventListener('click', () => { toggle.classList.toggle('active'); nav.classList.toggle('open'); });
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => { toggle.classList.remove('active'); nav.classList.remove('open'); });
    });
  </script>
</body>
</html>
